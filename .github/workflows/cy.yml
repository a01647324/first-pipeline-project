name: Simple CI

on:
  push:
    branches: [main]
  pull_request:        # corre en PRs, no solo en push
    branches: [main]

jobs:
  buildAndTest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'   # guarda node_modules en caché entre runs

      - name: Install dependencies
        run: npm ci      # npm ci es más seguro en CI

      - name: Run tests
        run: npm test